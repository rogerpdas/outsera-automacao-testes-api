name: API Tests — Desafio Outsera

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: Executar testes de API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Exibir versões do ambiente
        run: |
          java -version
          mvn -version

      - name: Executar testes com Maven
        run: mvn test -Denv=hom --batch-mode --no-transfer-progress

      - name: Publicar Extent Report como artefato
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extent-report-${{ github.run_number }}
          path: test-output/extent-reports/
          retention-days: 30

      - name: Sumário dos resultados no log
        if: always()
        run: |
          echo "=================================================="
          echo "         SUMÁRIO DE TESTES — DummyJSON            "
          echo "=================================================="
          if [ -f test-output/extent-reports/summary.properties ]; then
            source test-output/extent-reports/summary.properties
            echo "✅ Passou : $PASSED"
            echo "❌ Falhou : $FAILED"
            echo "📊 Total  : $TOTAL"
          else
            echo "⚠️  Arquivo de sumário não encontrado."
          fi
          echo "=================================================="
          echo "📄 Relatório visual: https://rogerpdas.github.io/outsera-automacao-testes-api/"
          echo "📄 Relatório HTML: https://rogerpdas.github.io/outsera-automacao-testes-api/report.html"
          echo "📄 Relatório API: https://rogerpdas.github.io/outsera-automacao-testes-api/api-test-report.html"
          echo "=================================================="

      - name: Deploy do Extent Report para GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always() && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: test-output/extent-reports/
          publish_branch: gh-pages
          commit_message: "ci: atualiza relatório de testes - run #${{ github.run_number }}"